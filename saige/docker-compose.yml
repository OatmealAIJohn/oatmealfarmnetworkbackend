services:
  redis:
    image: redis:7-alpine
    container_name: farm_advisory_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: farm_advisory_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: "/app"
      REDIS_ENABLED: "true"
      REDIS_URL: "redis://redis:6379/0"
      GOOGLE_APPLICATION_CREDENTIALS: "/app/credentials/animated-flare-421518-987b2bb1581d.json"
    volumes:
      - ./credentials:/app/credentials
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
